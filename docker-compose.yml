version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: unblu-postgres
    environment:
      POSTGRES_DB: unblu_poc
      POSTGRES_USER: unblu
      POSTGRES_PASSWORD: unblu_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unblu"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
