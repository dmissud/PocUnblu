version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: unblu-postgres
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-unblu_poc}
      POSTGRES_USER: ${DATABASE_USERNAME:-unblu}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unblu"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - unblu-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: unblu-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - unblu-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: unblu-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    networks:
      - unblu-network

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: unblu-kafka-init
    depends_on:
      - kafka
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "
      echo 'Waiting for Kafka to be ready...'
      cub kafka-ready -b kafka:29092 1 60

      echo 'Creating topics...'
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --partitions 3 --replication-factor 1 --topic unblu.webhook.events
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --partitions 1 --replication-factor 1 --topic unblu.webhook.events.dlq

      echo 'Topics created:'
      kafka-topics --list --bootstrap-server kafka:29092
      "
    networks:
      - unblu-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: unblu-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: unblu-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    networks:
      - unblu-network

networks:
  unblu-network:
    driver: bridge

volumes:
  postgres_data:
