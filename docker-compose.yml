version: '3.8'
# Docker Compose — côté Bloc 2 (Superviseur), utilisé pour les tests d'intégration.
# Inclut toutes les infrastrures nécessaires aux DEUX blocs (Kafka pour Bloc 1, PostgreSQL pour Bloc 1).
# Note: définitions Kafka centralisées ici (topics créés par kafka-init) mais consommés par Bloc 1.

services:

  # =====================
  # FONDATIONS PARTAGÉES
  # =====================

  postgres:
    image: postgres:16-alpine
    container_name: unblu-postgres
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-unblu_poc}
      POSTGRES_USER: ${DATABASE_USERNAME:-unblu}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unblu"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - unblu-network
    env_file:
      - .env

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: unblu-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - unblu-network

  # Kafka — infrastructure Bloc 1, définie ici pour les tests
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: unblu-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    networks:
      - unblu-network

  # Initialisation des topics Kafka (Bloc 1)
  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: unblu-kafka-init
    depends_on:
      - kafka
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "
      echo 'Waiting for Kafka to be ready...'
      cub kafka-ready -b kafka:29092 1 60

      echo 'Creating topics...'
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --partitions 3 --replication-factor 1 --topic unblu.webhook.events
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --partitions 1 --replication-factor 1 --topic unblu.webhook.events.dlq
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --partitions 3 --replication-factor 1 --topic unblu.bot.commands
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --partitions 3 --replication-factor 1 --topic unblu.bot.actions
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --partitions 1 --replication-factor 1 --topic unblu.bot.actions.dlq

      echo 'Topics created:'
      kafka-topics --list --bootstrap-server kafka:29092
      "
    networks:
      - unblu-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: unblu-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: unblu-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    networks:
      - unblu-network

  # ======================================
  # BLOC 1 — Integration Layer (Tests)
  # ======================================

  # webhook-entrypoint: reçoit les événements Unblu et publie sur Kafka
  # port: 8083 (Unblu webhook target, configuré dans WebhookSetupService du Bloc 2)
  webhook-entrypoint:
    profiles: ["integration"]
    build:
      context: ..
      dockerfile: webhook-entrypoint/Dockerfile
    container_name: unblu-webhook-entrypoint
    ports:
      - "8083:8083"
    env_file:
      - ../.env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      kafka:
        condition: service_started
    networks:
      - unblu-network

  # engine: consomme Kafka, persiste en PostgreSQL, expose REST
  # port: 8082 (consommé par le Bloc 2 via ConversationHistoryProxyController)
  engine:
    profiles: ["integration"]
    build:
      context: ..
      dockerfile: engine/Dockerfile
    container_name: unblu-engine
    ports:
      - "8082:8082"
    env_file:
      - ../.env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      DATABASE_URL: jdbc:postgresql://postgres:5432/${DATABASE_NAME:-unblu_poc}
      DATABASE_USERNAME: ${DATABASE_USERNAME:-unblu}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    networks:
      - unblu-network

  # ======================================
  # BLOC 2 — Supervisor (Tests)
  # ======================================

  # unblu-configuration: superviseur + frontend Angular
  # port: 8081
  supervisor:
    profiles: ["integration"]
    build:
      context: ..
      dockerfile: unblu-configuration/Dockerfile
    container_name: unblu-supervisor
    ports:
      - "8081:8081"
    env_file:
      - ../.env
    environment:
      INTEGRATION_EVENT_PROCESSOR_URL: http://engine:8082
    depends_on:
      - engine
    networks:
      - unblu-network

networks:
  unblu-network:
    driver: bridge

volumes:
  postgres_data:
