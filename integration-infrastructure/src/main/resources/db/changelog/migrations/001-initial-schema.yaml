databaseChangeLog:
  - changeSet:
      id: 001-initial-schema
      author: dbs
      comment: Initial schema - conversation history tables
      changes:
        - createTable:
            tableName: conversation_history
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: conversation_id
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true
                    uniqueConstraintName: ukgw6ddwdipjofkrai09j47ci9s
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
              - column:
                  name: ended_at
                  type: TIMESTAMP WITH TIME ZONE

        - createTable:
            tableName: participant_history
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: conversation_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_participant_conversation
                    references: conversation_history(id)
                    deleteCascade: true
              - column:
                  name: person_id
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: display_name
                  type: VARCHAR(255)
              - column:
                  name: type
                  type: VARCHAR(50)
                  constraints:
                    nullable: false

        - createTable:
            tableName: conversation_event_history
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: conversation_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_event_conversation
                    references: conversation_history(id)
                    deleteCascade: true
              - column:
                  name: event_type
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: event_time
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: message_text
                  type: TEXT
              - column:
                  name: sender_person_id
                  type: VARCHAR(255)
              - column:
                  name: sender_display_name
                  type: VARCHAR(255)

      rollback:
        - dropTable:
            tableName: conversation_event_history
        - dropTable:
            tableName: participant_history
        - dropTable:
            tableName: conversation_history
