server.port=8081
# Configuration de Camel
camel.servlet.mapping.context-path=/api/*

# Swagger UI servi via webjars a : /webjars/swagger-ui/index.html?url=/api/api-doc

# Static resources location for Angular app
spring.web.resources.static-locations=classpath:/static/browser/

logging.level.org.dbs.poc.unblu=DEBUG
unblu.api.summary-bot-person-id=tkbR8LA7Sm2J6-eSliAsFg

# Actuator configuration for monitoring
management.endpoints.web.exposure.include=health,info,metrics,camelroutes,camelroutecontroller
management.endpoint.health.show-details=always
management.endpoint.camelroutes.enabled=true
management.endpoint.camelroutecontroller.enabled=true

# Camel metrics configuration
camel.springboot.management.enabled=true
camel.springboot.jmx-enabled=true

# Mock configuration
mock.rule-engine.enabled=true
mock.rule-engine.default-team-id=cAaYUeKyTZ25_OaA6jUeVA

# Webhook configuration
unblu.webhook.name=${UNBLU_WEBHOOK_NAME:unblu-poc-webhook}
unblu.webhook.local-port=${UNBLU_WEBHOOK_LOCAL_PORT:8081}
unblu.webhook.events=${UNBLU_WEBHOOK_EVENTS:conversation.created}
unblu.webhook.endpoint-path=${UNBLU_WEBHOOK_ENDPOINT_PATH:/webhooks/unblu}