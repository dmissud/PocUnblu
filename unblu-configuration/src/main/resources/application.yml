server:
  port: 8081

spring:
  application:
    name: unblu
  web:
    resources:
      static-locations: classpath:/static/browser/
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    enabled: true

# Configuration de Camel
camel:
  springboot:
    management:
      enabled: true
    jmx-enabled: true

# SpringDoc OpenAPI configuration
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
    display-request-duration: true

logging:
  level:
    org.dbs.poc.unblu: INFO

# Unblu API configuration
unblu:
  api:
    base-url: ${UNBLU_API_BASE_URL:https://services8.unblu.com/app/rest/v4}
    username: ${UNBLU_API_USERNAME}
    password: ${UNBLU_API_PASSWORD}
    bot-name: ${UNBLU_BOT_NAME:Boby}
    poc-bot-name: ${UNBLU_POC_BOT_NAME:PocBot}
    poc-bot-onboarding-order: ${UNBLU_POC_BOT_ONBOARDING_ORDER:1}
    summary-bot-person-id: I2mWhL8AREW88xHy3BmdcA
    proxy:
      host: ${UNBLU_PROXY_HOST:}
      port: ${UNBLU_PROXY_PORT:8080}
      username: ${UNBLU_PROXY_USERNAME:}
      password: ${UNBLU_PROXY_PASSWORD:}
  webhook:
    name: ${UNBLU_WEBHOOK_NAME:unblu-poc-webhook}
    local-port: ${UNBLU_WEBHOOK_LOCAL_PORT:8081}
    endpoint-path: ${UNBLU_WEBHOOK_ENDPOINT_PATH:/api/webhooks/unblu}
  bot:
    local-port: ${UNBLU_BOT_LOCAL_PORT:8082}

# Actuator configuration for monitoring
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,camelroutes,camelroutecontroller,prometheus
  endpoint:
    health:
      show-details: always
    camelroutes:
      enabled: true
    camelroutecontroller:
      enabled: true

# Resilience4j configuration
resilience4j:
  circuitbreaker:
    instances:
      erp:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10000
      ruleEngine:
        registerHealthIndicator: true
        slidingWindowSize: 5
        failureRateThreshold: 50
      unblu:
        registerHealthIndicator: true
        slidingWindowSize: 20
        failureRateThreshold: 50
      summary:
        registerHealthIndicator: true
  retry:
    instances:
      erp:
        maxAttempts: 3
        waitDuration: 1000
      unblu:
        maxAttempts: 3
        waitDuration: 2000

# LiveKit reverse proxy configuration
livekit:
  base-url: ${LIVEKIT_BASE_URL:http://localhost:8082}

# Webhook entrypoint reverse proxy configuration
webhook:
  entrypoint:
    base-url: ${WEBHOOK_ENTRYPOINT_BASE_URL:http://localhost:8083}

# Mock configuration
mock:
  rule-engine:
    enabled: true
    default-team-id: cAaYUeKyTZ25_OaA6jUeVA
