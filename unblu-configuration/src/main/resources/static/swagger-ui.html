<!DOCTYPE html>
<html lang="fr">
<head>
    <title>Unblu API - Swagger UI</title>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" type="text/css" href="/webjars/swagger-ui/5.18.2/swagger-ui.css">
</head>
<body>
<div id="swagger-ui"></div>
<script src="/webjars/swagger-ui/5.18.2/swagger-ui-bundle.js"></script>
<script src="/webjars/swagger-ui/5.18.2/swagger-ui-standalone-preset.js"></script>
<script>
    window.onload = function () {
        SwaggerUIBundle({
            url: "/api/api-doc",
            dom_id: '#swagger-ui',
            presets: [
                SwaggerUIBundle.presets.apis,
                SwaggerUIStandalonePreset
            ],
            layout: "StandaloneLayout"
        });
    }
</script>
</body>
</html>
